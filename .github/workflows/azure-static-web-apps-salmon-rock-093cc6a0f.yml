name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'index.html'
      - 'css/**'
      - 'js/**'
      - 'images/**'
      - 'staticwebapp.config.json'
      - '.github/workflows/azure-static-web-apps-salmon-rock-093cc6a0f.yml'
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_ROCK_093CC6A0F || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/" # App source code path
          api_location: "api" # Api source code path - optional
          output_location: "" # No build output - static site
          skip_app_build: true # Skip npm install at root - static HTML/CSS/JS
          ###### End of Repository/Build Configurations ######

