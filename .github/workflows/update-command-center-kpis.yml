name: Update Command Center KPI Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */6 * * *"

permissions:
  contents: write

jobs:
  update-kpi-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update KPI feed files
        env:
          # Optional: set to a PAT with repo read access if telemetry source repo is private.
          # Example: ACP_REPO_TOKEN: ghp_xxx
          ACP_REPO_TOKEN: ""
          TARGET_REPO: amerikian/acp-dev-workspace
        run: |
          node scripts/update-command-center-kpis.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No KPI changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/command-center/data/kpi-live.json docs/ops-hub-x7k9m2/data/kpi-live.json
          git commit -m "Update command center KPI live feed"
          git push
